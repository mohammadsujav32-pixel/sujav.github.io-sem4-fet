<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujav | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        
        .bg-mesh {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1e2f 0%, #0a0a0a 100%);
            z-index: -1;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        
        .profile-card {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 40px;
            text-align: center;
            backdrop-filter: blur(20px);
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        
        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tag-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .tag {
            font-size: 0.75rem;
            padding: 6px 14px;
            border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a1a1aa;
        }

        .tag.highlight {
            border-color: #818cf8;
            color: #818cf8;
        }

        p {
            color: #a1a1aa;
            line-height: 1.6;
            font-size: 1.05rem;
            margin-bottom: 35px;
        }

        
        .action-link {
            position: relative;
            display: inline-block;
            padding: 15px 35px;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            border-radius: 15px;
            background: #fff;
            color: #000;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .action-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
            background: #818cf8;
            color: #fff;
        }

        
        .circle-decoration {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 40px;
            height: 40px;
            background: #818cf8;
            border-radius: 50%;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>
    <div class="blob"></div>

    <div class="profile-card">
        <div class="circle-decoration"></div>
        
        <h1>SUJAV</h1>
        
        <div class="tag-row">
            <span class="tag">2nd Year</span>
            <span class="tag highlight">CS Engineer</span>
        </div>

        <p>
            Building the future through code. I am a curious student dedicated to mastering the art of software and personal growth in mite institution of engineering college moodbidri thodar
        </p>

        <a href="https://nikhitha0262.github.io/nikhitha.github.io-sem4-fet/" class="action-link">
            Explore Project →
        </a>
    </div>

</body>
</html>
