<!DOCTYPE html>
<html>
<head>
<title>Smart Contact Form</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3a8a, #06b6d4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.form-container {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    width: 360px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.25);
    animation: fadeIn 0.6s ease-in-out;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #1e3a8a;
}

/* Floating input */
.input-group {
    position: relative;
    margin-bottom: 20px;
}

.input-group input,
.input-group textarea {
    width: 100%;
    padding: 10px;
    border: none;
    border-bottom: 2px solid #ccc;
    outline: none;
    background: transparent;
}

.input-group label {
    position: absolute;
    top: 10px;
    left: 0;
    color: #777;
    transition: 0.3s;
}

.input-group input:focus + label,
.input-group input:valid + label,
.input-group textarea:focus + label,
.input-group textarea:valid + label {
    top: -10px;
    font-size: 12px;
    color: #06b6d4;
}

.input-group input:focus,
.input-group textarea:focus {
    border-bottom: 2px solid #06b6d4;
}

/* Error */
.error {
    color: red;
    font-size: 12px;
}

/* Character counter */
.counter {
    font-size: 12px;
    text-align: right;
    color: #555;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(135deg, #06b6d4, #1e3a8a);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Success message */
.success {
    margin-top: 15px;
    padding: 10px;
    background: #dcfce7;
    color: #166534;
    border-left: 4px solid green;
    border-radius: 6px;
    animation: pop 0.5s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(15px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes pop {
    from {transform: scale(0.9); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}
</style>
</head>

<body>

<div class="form-container">
    <h2>Contact Me</h2>

    <form id="myForm">

        <div class="input-group">
            <input type="text" id="name" required>
            <label>Name</label>
            <div class="error" id="nameError"></div>
        </div>

        <div class="input-group">
            <input type="text" id="email" required>
            <label>Email</label>
            <div class="error" id="emailError"></div>
        </div>

        <div class="input-group">
            <textarea id="message" required></textarea>
            <label>Message</label>
            <div class="counter" id="counter">0/100</div>
            <div class="error" id="msgError"></div>
        </div>

        <button type="submit">Send Message</button>
    </form>

    <div id="output"></div>
</div>

<script>
const messageField = document.getElementById("message");
const counter = document.getElementById("counter");

messageField.addEventListener("input", () => {
    counter.textContent = messageField.value.length + "/100";
});

document.getElementById("myForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = name.value.trim();
    let email = email.value.trim();
    let message = messageField.value.trim();

    let isValid = true;

    document.getElementById("nameError").textContent = "";
    document.getElementById("emailError").textContent = "";
    document.getElementById("msgError").textContent = "";

    if (!/^[A-Za-z ]+$/.test(name)) {
        document.getElementById("nameError").textContent = "Only letters allowed";
        isValid = false;
    }

    if (!/^[^ ]+@[^ ]+\.[a-z]{2,3}$/.test(email)) {
        document.getElementById("emailError").textContent = "Invalid email";
        isValid = false;
    }

    if (message.length < 5) {
        document.getElementById("msgError").textContent = "Minimum 5 characters";
        isValid = false;
    }

    if (isValid) {
        document.getElementById("output").innerHTML = `
            <div class="success">
                ✅ Message Sent Successfully!
            </div>
        `;
        document.getElementById("myForm").reset();
        counter.textContent = "0/100";
    }
});
</script>

</body>
</html>
