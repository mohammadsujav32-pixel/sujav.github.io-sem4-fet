<!DOCTYPE html>
<html>
<head>
<title>Multi-Step Form</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(120deg, #0f172a, #2563eb);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 25px;
    width: 380px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.step {
    display: none;
}

.step.active {
    display: block;
}

.progress {
    height: 6px;
    background: #ddd;
    border-radius: 5px;
    margin-bottom: 15px;
}

.progress-bar {
    height: 100%;
    width: 33%;
    background: #2563eb;
    border-radius: 5px;
    transition: 0.3s;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
    border: none;
    background: #2563eb;
    color: white;
    cursor: pointer;
}

.preview {
    background: #f1f5f9;
    padding: 10px;
    margin-top: 10px;
}

.list {
    margin-top: 15px;
    max-height: 150px;
    overflow-y: auto;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

<div class="progress">
    <div class="progress-bar" id="bar"></div>
</div>

<form id="form">

    <!-- Step 1 -->
    <div class="step active">
        <h3>Step 1: Name</h3>
        <input type="text" id="name" placeholder="Enter Name">
        <button type="button" onclick="nextStep()">Next</button>
    </div>

    <!-- Step 2 -->
    <div class="step">
        <h3>Step 2: Email</h3>
        <input type="text" id="email" placeholder="Enter Email">
        <button type="button" onclick="nextStep()">Next</button>
    </div>

    <!-- Step 3 -->
    <div class="step">
        <h3>Step 3: Message</h3>
        <textarea id="message" placeholder="Enter Message"></textarea>
        <button type="button" onclick="showPreview()">Preview</button>
    </div>

    <!-- Preview -->
    <div class="step">
        <h3>Preview</h3>
        <div class="preview" id="preview"></div>
        <button type="submit">Submit</button>
    </div>

</form>

<div class="list" id="dataList"></div>

</div>

<script>
let current = 0;
let steps = document.querySelectorAll(".step");

function nextStep() {
    steps[current].classList.remove("active");
    current++;
    steps[current].classList.add("active");
    updateBar();
}

function updateBar() {
    document.getElementById("bar").style.width = (current+1)*25 + "%";
}

function showPreview() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let message = document.getElementById("message").value;

    document.getElementById("preview").innerHTML = `
        Name: ${name} <br>
        Email: ${email} <br>
        Message: ${message}
    `;

    nextStep();
}

document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let message = document.getElementById("message").value;

    let entry = `<div>👤 ${name} | 📧 ${email}</div>`;

    document.getElementById("dataList").innerHTML += entry;

    // reset form
    this.reset();
    steps[current].classList.remove("active");
    current = 0;
    steps[current].classList.add("active");
    updateBar();
});
</script>

</body>
</html>
